<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#7c3aed">
<title>Play Nexa — Offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
.logo{font-size:2.5rem;font-weight:900;letter-spacing:4px;margin-bottom:1.5rem;background:linear-gradient(135deg,#7c5cff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.icon{font-size:4rem;margin-bottom:1rem}
.title{font-size:1.25rem;font-weight:700;margin-bottom:0.5rem}
.sub{color:#94a3b8;font-size:0.875rem;line-height:1.5;margin-bottom:2rem;max-width:280px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:0.75rem 2rem;background:linear-gradient(135deg,#7c5cff,#6d4de6);color:#fff;border:none;border-radius:0.75rem;font-size:0.875rem;font-weight:600;text-decoration:none;min-height:44px;min-width:44px;transition:transform 0.15s}
.btn:active{transform:scale(0.95)}
</style>
</head>
<body>
<div class="icon">📡</div>
<div class="logo">Play Nexa</div>
<h1 class="title">You're offline</h1>
<p class="sub">Previously played games are still available from cache. Reconnect to discover new content.</p>
<a href="/games" class="btn">Go to Game Hub</a>
</body>
</html>
